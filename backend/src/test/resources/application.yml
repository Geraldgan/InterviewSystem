spring:
  datasource:
    # 测试环境继续使用 H2 内存库，但打开 MySQL 兼容模式，避免依赖本地 MySQL 服务。
    url: jdbc:h2:mem:interview-system-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  ai:
    mock-enabled: true
