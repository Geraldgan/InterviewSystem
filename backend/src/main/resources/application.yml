spring:
  application:
    name: interview-system-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/interview_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
    allowed-origin-patterns:
      # 放行 H5 开发时常见的动态本地端口。
      - http://localhost:[*]
      - http://127.0.0.1:[*]
      # 放行局域网调试，便于微信小程序与手机真机访问本机后端。
      - http://10.*.*.*:[*]
      - http://172.*.*.*:[*]
      - http://192.168.*.*:[*]
  ai:
    mock-enabled: true
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5-mini}
    reasoning-effort: ${OPENAI_REASONING_EFFORT:low}
    request-timeout-seconds: 60
